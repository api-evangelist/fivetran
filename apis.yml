aid: fivetran
name: Fivetran
description: >-
  Fivetran is an automated data integration platform providing pre-built
  connectors for syncing data from SaaS applications, databases, and APIs into
  cloud data warehouses. The Fivetran REST API exposes management of users,
  groups, teams, roles, destinations, connections, transformations, webhooks,
  certificates, and connector metadata.
type: Index
