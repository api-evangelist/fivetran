apis:
  - aid: fivetran:fivetran-rest-api
    name: Fivetran REST API
    description: >-
      The Fivetran REST API allows programmatic management of all platform
      resources including users, roles, teams, groups, destinations,
      connections, webhooks, transformations, transformation projects,
      certificates, system keys, hybrid deployment agents, log services,
      private links, proxy agents, and connector metadata. Authentication is
      performed using a system key.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://fivetran.com/docs/rest-api
